{% extends "base.html" %}
{% load static %}

{% block title %}ലോഗിൻ - പാക്കട{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-sm-10 col-md-6 col-lg-5">

        <div class="card">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <img src="{% static 'images/logo.jpg' %}" alt="Pakkada Family Logo" 
                             style="height: 100px; width: auto; border-radius: 12px; box-shadow: var(--card-shadow); opacity: 0.9;">
                    </div>
                    <h1 class="page-heading fs-3">LOGIN</h1>
                    {% comment %} <p class="page-subheading">Sign In</p> {% endcomment %}
                    <hr class="mt-4 mb-4 opacity-10">
                </div>

                {% if form.errors %}
                <div class="alert alert-danger py-2">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>
                    Invalid username or password.
                </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="mb-3">
                        <label class="form-label" for="id_username">
                            Username
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="id_username"
                                   name="username" placeholder="Username"
                                   autofocus autocomplete="username" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="id_password">
                            Password
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="id_password"
                                   name="password" placeholder="Password"
                                   autocomplete="current-password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
