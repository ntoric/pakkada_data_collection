{% extends "base.html" %}

{% block title %}ലോഗിൻ - പാക്കട{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-sm-10 col-md-6 col-lg-5">

        <div class="text-center mb-4">
            <div class="display-5 mb-2" style="color: var(--primary);">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h1 class="page-heading fs-3">പാക്കട ഡേറ്റ കളക്ഷൻ</h1>
            <p class="page-subheading">തുടരാൻ ലോഗിൻ ചെയ്യുക</p>
        </div>

        <div class="card">
            <div class="card-body p-4">

                {% if form.errors %}
                <div class="alert alert-danger py-2">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>
                    ഉപയോക്തൃ നാമം അല്ലെങ്കിൽ പാസ്‌വേഡ് തെറ്റ്. വീണ്ടും ശ്രമിക്കുക.
                </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="mb-3">
                        <label class="form-label" for="id_username">
                            ഉപയോക്തൃ നാമം
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="id_username"
                                   name="username" placeholder="Username"
                                   autofocus autocomplete="username" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="id_password">
                            പാസ്‌വേഡ്
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="id_password"
                                   name="password" placeholder="Password"
                                   autocomplete="current-password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 fw-600">
                        <i class="bi bi-box-arrow-in-right me-2"></i>ലോഗിൻ
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock %}
