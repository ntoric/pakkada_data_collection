{% extends "base.html" %}

{% block title %}വിജയം - ഫോം സമർപ്പിച്ചു{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card py-5">
            <div class="card-body">
                <div class="display-1 mb-3" style="color: var(--primary-light);">
                    <i class="bi bi-check-circle-fill"></i>
                </div>
                <h2 class="fw-bold mb-2" style="color: var(--primary-dark);">ഫോം സമർപ്പിച്ചു!</h2>
                <p class="text-muted mb-4">കുടുംബ ഡേറ്റ വിജയകരമായി സൂക്ഷിച്ചു.</p>
                <div class="d-flex gap-3 justify-content-center">
                    <a href="{% url 'family:list' %}" class="btn btn-outline-primary">
                        <i class="bi bi-list-ul me-1"></i>എല്ലാ രേഖകൾ
                    </a>
                    <a href="{% url 'family:create' %}" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-1"></i>പുതിയ ഫോം
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
