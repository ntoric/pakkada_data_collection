{% extends 'base.html' %}

{% block title %}അറിയിപ്പ് അയക്കുക - പാക്കട കുടുംബം{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-broadcast me-2"></i>അറിയിപ്പ് അയക്കുക (Broadcast)</h5>
            </div>
            <div class="card-body p-4">
                <p class="text-muted small mb-4">
                    സബ്‌സ്‌ക്രൈബ് ചെയ്ത എല്ലാ ഉപയോക്താക്കൾക്കും ഈ സന്ദേശം ലഭിക്കും.
                </p>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="title" class="form-label">ശീർഷകം (Title)</label>
                        <input type="text" name="title" id="title" class="form-control" placeholder="ഉദാ: പുതിയ വാർത്ത" value="{{ title_val }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label">സന്ദേശം (Message)</label>
                        <textarea name="message" id="message" class="form-control" rows="4" placeholder="അയക്കേണ്ട സന്ദേശം ഇവിടെ ടൈപ്പ് ചെയ്യുക..." required>{{ message_val }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label for="link" class="form-label">ലിങ്ക് (Link - Optional)</label>
                        <input type="text" name="link" id="link" class="form-control" placeholder="ഉദാ: /records/" value="{{ link_val }}">
                        <div class="form-text mt-1">അറിയിപ്പിൽ ക്ലിക്ക് ചെയ്യുമ്പോൾ പോകേണ്ട ലിങ്ക്.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send me-1"></i>അറിയിപ്പ് അയക്കുക
                        </button>
                        <a href="{% url 'family:user_list' %}" class="btn btn-outline-secondary">
                            റദ്ദാക്കുക
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
